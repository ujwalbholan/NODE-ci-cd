name: NODE-CI/CD

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

permissions:
  contents: read
  security-events: write

env:
  CI: true
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/node-cicd-app
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ----------------------------
  # 1. BUILD + TEST + DOCKER BUILD
  # ----------------------------
  build-the-project:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.20.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Run tests
        run: pnpm test

      - name: Build Docker image
        run: |
          docker build \
            -t $IMAGE_NAME:$IMAGE_TAG \
            .
      - name: Save Docker Image
        run: |
          docker save \
           -o image.tar \
            $IMAGE_NAME:$IMAGE_TAG

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: image.tar

  # ----------------------------
  # 2. SECURITY SCAN (TRIVY)
  # ----------------------------
  security-scan-using-trivy:
    runs-on: ubuntu-latest
    needs: build-the-project

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download Docker image artifact
        uses: actions/download-artifact@v6
        with:
          name: docker-image

      - name: Load Docker image
        run: docker.load -i image.tar

      - name: Run Trivy scan (SARIF)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif

      - name: Generate JSON report
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          format: json
          output: trivy-results.json
          severity: CRITICAL,HIGH

      - name: Generate HTML report
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          format: template
          template: "@${{ github.workspace }}/.github/trivy/html.tpl"
          output: trivy-results.html
          severity: CRITICAL,HIGH

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: trivy-reports
          path: |
            trivy-results.sarif
            trivy-results.json
            trivy-results.html

      - name: Fail on CRITICAL vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          format: table
          exit-code: 1
          severity: CRITICAL

  # ----------------------------
  # 3. PUSH IMAGE
  # ----------------------------
  push-to-dockerhub:
    runs-on: ubuntu-latest
    needs: security-scan-using-trivy

    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download Docker image artifact
        uses: actions/download-artifact@v6
        with:
          name: docker-image

      - name: Load Docker image
        run: docker load -i image.tar

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push image
        run: |
          docker push $IMAGE_NAME:$IMAGE_TAG

      - name: Logout from docker
        run: docker logout

  # ----------------------------
  # 4. SIGN IMAGE (COSIGN)
  # ----------------------------
  sign-docker-image:
    runs-on: ubuntu-latest
    needs: push-to-dockerhub

    if: github.event_name == 'push'

    steps:
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Image digest
        run: |
          IMAGE_DIGEST="$(docker buildx imagetools inspect "$IMAGE_NAME:$IMAGE_TAG" --format '{{ .Manifest.Digest }}')"
          echo "IMAGE_DIGEST=$IMAGE_DIGEST" >> "$GITHUB_ENV"

      - name: Sign Docker image
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          printf '%b' "$COSIGN_PRIVATE_KEY" > cosign.key

          cosign sign \
            --key cosign.key \
            "$IMAGE_NAME@$IMAGE_DIGEST" \
            --yes

