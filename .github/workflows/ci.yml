name: NODE-CI/CD

on:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  CI: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.20.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Audit dependencies
        run: pnpm audit --audit-level=high

      - name: Run tests
        run: pnpm test

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build \
          -t ${{ secrets.DOCKER_USERNAME }}/node-cicd-app:latest \
          -t ${{ secrets.DOCKER_USERNAME }}/node-cicd-app:${{ github.sha }} \
          .

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/node-cicd-app:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/node-cicd-app:${{ github.sha }}

      - name: Logout from Docker
        run: docker logout
