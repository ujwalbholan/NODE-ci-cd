name: NODE-CI/CD

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

permissions:
  contents: read
  security-events: write

env:
  CI: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.20.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Audit dependencies
        run: pnpm audit --audit-level=high --json

      - name: Run tests
        run: pnpm test

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build \
          -t ${{ secrets.DOCKER_USERNAME }}/node-cicd-app:latest \
          -t ${{ secrets.DOCKER_USERNAME }}/node-cicd-app:${{ github.sha }} \
          .

      - name: Run Trivy scan (SARIF)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/node-cicd-app:latest
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        with:
          sarif_file: trivy-results.sarif

      - name: Generate JSON report
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/node-cicd-app:latest
          format: json
          output: trivy-results.json
          severity: CRITICAL,HIGH

      - name: Generate HTML report
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/node-cicd-app:latest
          format: template
          template: "@.github/trivy/html.tpl"
          output: trivy-results.html
          severity: CRITICAL,HIGH

      - name: Upload Trivy Reports
        uses: actions/upload-artifact@v4
        with:
          name: trivy-security-reports
          path: |
            trivy-results.sarif
            trivy-results.json
            trivy-results.html

      - name: Fail build on CRITICAL vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/node-cicd-app:latest
          format: table
          exit-code: 1
          severity: CRITICAL

      - name: Push Docker image
        if: github.event_name == 'push'
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/node-cicd-app:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/node-cicd-app:${{ github.sha }}

      - name: Logout from Docker
        run: docker logout

# renderer webhooks way but only fro premium user
  - name: Trigger Render Deploy
    if: github.ref == 'refs/heads/main'
    env:
      deploy_url: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
    run: |
      curl "$deploy_url"

# This is how cosign  is verify while deploying the docker image
cosign verify \
    --key cosign.pub \
    docker.io/YOUR_USERNAME/node-cicd-app:latest